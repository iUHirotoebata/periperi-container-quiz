<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>その容器、本当に続けられますか？</title>
  <style>
    body {
      font-family: sans-serif;
      background: linear-gradient(180deg, #e6f7f6, #f7faf9);
      color: #1f2937;
      margin: 0;
      padding: 24px;
      line-height: 1.7;
    }
    .card {
      background: #fff;
      padding: 28px;
      border-radius: 20px;
      max-width: 680px;
      margin: 24px auto;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    h1 { font-size: 34px; line-height: 1.25; }
    h2 { color: #0f766e; }
    .button {
      display: block;
      width: 100%;
      background: #0ea5a5;
      color: white;
      border: none;
      padding: 14px 18px;
      border-radius: 12px;
      margin: 12px 0;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }
    .button.secondary { background: #334155; }
    .button.light {
      background: #e0f2f1;
      color: #0f766e;
    }
    .small { font-size: 14px; color: #64748b; }
    .result { font-size: 22px; font-weight: bold; color: #0f766e; }
    a { color: #0f766e; font-weight: bold; }
  </style>
</head>
<body>

<div class="card" id="app"></div>

<script>
const questions = [
  {
    q: "近年、食品容器価格上昇の大きな要因は？",
    choices: ["木材不足", "ナフサ価格高騰", "水不足", "人口減少"],
    answer: 1,
    explain: "プラスチック原料となるナフサ価格の高騰により、食品容器価格も上昇するリスクがあります。"
  },
  {
    q: "なぜワンウェイ容器は、すぐにはなくならないのでしょう？",
    choices: ["人気があるから", "衛生・物流・店舗運用上必要だから", "色が多いから", "海外製だから"],
    answer: 1,
    explain: "食品流通では、衛生管理・物流効率・店舗オペレーションの観点から、ワンウェイ容器が必要な場面がまだ多くあります。"
  },
  {
    q: "リサイクル材活用容器のメリットとして近いものは？",
    choices: ["音が鳴る", "容器価格上昇リスク軽減", "色が変わる", "香りが出る"],
    answer: 1,
    explain: "バージン材依存を減らすことで、原料価格高騰リスクを抑え、環境対応にもつながります。"
  },
  {
    q: "エコマーク対応で重要なリサイクル材使用率の目安は？",
    choices: ["5%以上", "10%以上", "40%以上", "90%以上"],
    answer: 2,
    explain: "リサイクル材を40%以上使うことで、エコマーク訴求につながる可能性があります。"
  },
  {
    q: "食品容器導入で確認が必要なものは？",
    choices: ["工場ライン適性", "物流適性", "レンジアップ適性", "すべて"],
    answer: 3,
    explain: "食品容器は環境に良いだけでは導入できません。工場ライン、物流、レンジ対応などの検証が重要です。"
  },
  {
    q: "食品容器が『容器から容器へ』リサイクルしにくい理由は？",
    choices: ["重いから", "色が多いから", "油分や食品残渣", "小さいから"],
    answer: 2,
    explain: "油分や食品残渣が付着すると、容器から容器への水平リサイクルが難しくなります。"
  },
  {
    q: "デザイン変更などで使われなくなった包材は、どうなることが多い？",
    choices: ["保存される", "海外輸出", "廃棄処分", "自然分解"],
    answer: 2,
    explain: "未使用でも包材は産業廃棄物として処分費用が発生する場合があります。一方で、資源として回収し、新しい容器原料へ活用できる可能性もあります。"
  }
];

let current = 0;
let score = 0;

function start() {
  current = 0;
  score = 0;
  showQuestion();
}

function showTop() {
  document.getElementById("app").innerHTML = `
    <h1>その容器、<br>本当に続けられますか？</h1>
    <p>原油・ナフサ高騰。<br>ワンウェイ容器。<br>環境対応。<br>未使用包材。</p>
    <p>食品業界で今、“容器”が大きく変わろうとしています。</p>
    <p>この3分クイズでは、容器コスト、リサイクル材、エコマーク、水平リサイクル、包材廃棄について学べます。</p>
    <button class="button" onclick="start()">START</button>
    <p class="small">食品メーカー・流通・小売・外食・SCM・包材関係者向け</p>
  `;
}

function showQuestion() {
  const item = questions[current];
  document.getElementById("app").innerHTML = `
    <p class="small">QUESTION ${current + 1} / ${questions.length}</p>
    <h2>${item.q}</h2>
    ${item.choices.map((choice, index) => `
      <button class="button light" onclick="answer(${index})">${choice}</button>
    `).join("")}
  `;
}

function answer(index) {
  const item = questions[current];
  const correct = index === item.answer;
  if (correct) score++;

  document.getElementById("app").innerHTML = `
    <h2>${correct ? "正解！" : "惜しい！"}</h2>
    <p>${item.explain}</p>
    <button class="button" onclick="next()">NEXT</button>
  `;
}

function next() {
  current++;
  if (current < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  let title = "";
  let message = "";

  if (score <= 2) {
    title = "まだワンウェイ時代";
    message = "容器問題は、これからさらに重要になります。まずは原料高騰・廃棄コスト・回収の視点から見直してみましょう。";
  } else if (score <= 5) {
    title = "循環型社会への入口";
    message = "リサイクル材活用や水平リサイクルの考え方をかなり理解しています。次は自社容器・包材での可能性確認です。";
  } else {
    title = "容器DXリーダー";
    message = "あなたは循環型容器時代の変化をかなり理解しています。容器コスト対策と環境対応を同時に進められる可能性があります。";
  }

  const shareText = encodeURIComponent(`「その容器、本当に続けられますか？」食品容器・リサイクル材・エコマーク対応を学ぶ3分クイズをやってみました。 #ペリペリ君 #水平リサイクル #循環型社会`);
  const shareUrl = encodeURIComponent("https://iuhirotoebata.github.io/periperi-container-quiz/");

  document.getElementById("app").innerHTML = `
    <h2>RESULT</h2>
    <p>あなたのスコア：${score} / ${questions.length}</p>
    <p class="result">${title}</p>
    <p>${message}</p>

    <hr>

    <h2>容器価格の上昇を、<br>ただ受け入れる前に。</h2>
    <p>リサイクル材活用、エコマーク対応、未使用包材の再資源化という選択肢があります。</p>

    <button class="button" onclick="location.href='mailto:y-ara@ripples-ekth.co.jp?subject=容器・包材についての相談'">
      メールで相談する
    </button>

    <button class="button" onclick="location.href='https://ripples-ekth.com/?page_id=311'">
      Ripplesに問い合わせる
    </button>

    <button class="button secondary" onclick="location.href='https://hirotoebata.jp/2026/05/10/ripples_pp/'">
      ブログで詳しく見る
    </button>

    <button class="button light" onclick="location.href='https://twitter.com/intent/tweet?text=${shareText}&url=${shareUrl}'">
      Xでシェアする
    </button>

    <button class="button light" onclick="showTop()">
      もう一度やる
    </button>
  `;
}

showTop();
</script>

</body>
</html>
